name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: directcash
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d directcash"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate:api

      - name: Lint
        run: npm run lint

      - name: End-to-end tests
        run: npm run test:e2e:api
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5433
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6380
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/directcash?schema=public
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/directcash?schema=public

      - name: Unit tests
        run: npm run test:api

      - name: Build
        run: npm run build
