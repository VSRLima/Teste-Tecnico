services:
  postgres:
    image: postgres:16-alpine
    container_name: directcash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-directcash}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # DO NOT use a default password outside local development. Provide this explicitly via env or secret.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: directcash-redis
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--requirepass',
        '${REDIS_PASSWORD:?REDIS_PASSWORD is required}',
        '--appendonly',
        'yes',
      ]
    ports:
      - '${REDIS_PORT:-6380}:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
